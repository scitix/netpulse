# 02-netpulse/configmap.yaml
# ConfigMap for Netpulse non-secret environment variables
# This ConfigMap contains all non-sensitive configuration options shared by controller and worker
apiVersion: v1
kind: ConfigMap
metadata:
  name: netpulse-config
  namespace: netpulse
  labels:
    app: netpulse
    component: shared
# Update these values as needed for your deployment
# Secrets (passwords, API keys) are NOT included here
data:
  NETPULSE_LOG__LEVEL: "INFO"
  NETPULSE_WORKER__PINNED_PER_NODE: "128" # Max number of connected devices per pod
  NETPULSE_REDIS__HOST: "netpulse-redis-master"    # Operator 创建: 始终指向主节点
  NETPULSE_REDIS__PORT: "6379"
  NETPULSE_REDIS__TLS__ENABLED: "false"
  # Vault Credential Provider Configuration
  NETPULSE_CREDENTIAL__ENABLED: "true"
  NETPULSE_CREDENTIAL__NAME: "vault_kv"
  NETPULSE_CREDENTIAL__ADDR: "http://vault.netpulse.svc:8200"
  NETPULSE_CREDENTIAL__ALLOWED_PATHS: "kv/netpulse"
  NETPULSE_CREDENTIAL__VERIFY: "false"
  NETPULSE_CREDENTIAL__CACHE_TTL: "60" # Optimized cache for production
  NETPULSE_STORAGE__RETENTION_HOURS: "24"
  PYTHONUNBUFFERED: "1"                 # Ensure logs are not buffered
  # MongoDB audit log settings (set NETPULSE_MONGODB__ENABLED=true to activate)
  NETPULSE_MONGODB__ENABLED: "true"
  NETPULSE_MONGODB__URI: "mongodb://netpulse-user:netpulse_password_6b85cc6c1e219b83@mongodb:27017/netrix?authSource=admin"
  NETPULSE_MONGODB__DATABASE: "netrix"
  NETPULSE_MONGODB__COLLECTION: "test_netpulse_jobs"
  NETPULSE_MONGODB__DETACHED_COLLECTION: "test_netpulse_detached_tasks"
  NETPULSE_MONGODB__RETENTION_DAYS: "30"
  NETPULSE_MONGODB__DETACHED_RETENTION_DAYS: "30"
  NETPULSE_MONGODB__MAX_DOCUMENTS: "1000000"
---
# 02-netpulse/controller.deploy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netpulse-controller
  namespace: netpulse
spec:
  replicas: 3
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: netpulse
      component: controller
  template:
    metadata:
      labels:
        app: netpulse
        component: controller
    spec:
      terminationGracePeriodSeconds: 60
      affinity:
        podAntiAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
          - labelSelector:
              matchLabels:
                app: netpulse
                component: controller
            topologyKey: kubernetes.io/hostname
      containers:
      - name: controller
        image: localhost/netpulse-controller:0.4.3
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "2Gi"
            cpu: "2000m"
          limits:
            memory: "8Gi"
            cpu: "4000m"
        readinessProbe:
          exec:
            command:
            - python3
            - -c
            - "import urllib.request, os; req = urllib.request.Request('http://localhost:9000/health', headers={'X-API-KEY': os.environ['NETPULSE_SERVER__API_KEY']}); urllib.request.urlopen(req)"
          initialDelaySeconds: 5
          periodSeconds: 10
        livenessProbe:
          exec:
            command:
            - python3
            - -c
            - "import urllib.request, os; req = urllib.request.Request('http://localhost:9000/health', headers={'X-API-KEY': os.environ['NETPULSE_SERVER__API_KEY']}); urllib.request.urlopen(req)"
          initialDelaySeconds: 15
          periodSeconds: 20
        envFrom:
        - configMapRef:
            name: netpulse-config
        env:
        - name: NETPULSE_SERVER__API_KEY
          valueFrom:
            secretKeyRef:
              name: netpulse-secrets
              key: api-key
        - name: NETPULSE_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: netpulse-secrets
              key: password
        - name: NETPULSE_REDIS__SENTINEL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: netpulse-secrets
              key: password
        - name: NETPULSE_VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: netpulse-secrets
              key: vault-token
        ports:
        - containerPort: 9000
        volumeMounts:
        - name: netpulse-storage
          mountPath: /app/storage
      volumes:
      - name: netpulse-storage
        persistentVolumeClaim:
          claimName: netpulse-storage
---
# 02-netpulse/node-worker.deploy.yaml
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netpulse-node-worker
  namespace: netpulse
spec:
  replicas: 18
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 2
      maxUnavailable: 1
  selector:
    matchLabels:
      app: netpulse
      component: node-worker
  template:
    metadata:
      labels:
        app: netpulse
        component: node-worker
    spec:
      terminationGracePeriodSeconds: 120
      affinity:
        podAntiAffinity:
          preferredDuringSchedulingIgnoredDuringExecution: # 对于 18 个副本，使用 preferred 以允许每节点有多个
          - weight: 100
            podAffinityTerm:
              labelSelector:
                matchLabels:
                  app: netpulse
                  component: node-worker
              topologyKey: kubernetes.io/hostname
      containers:
      - name: node-worker
        image: localhost/netpulse-node-worker:0.4.3
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "2Gi"
            cpu: "500m"
          limits:
            memory: "16Gi"   # 增加内存上限以支持大文件处理
            cpu: "2000m"
        envFrom:
        - configMapRef:
            name: netpulse-config
        env:
        - name: NETPULSE_SERVER__API_KEY
          valueFrom:
            secretKeyRef:
              name: netpulse-secrets
              key: api-key
        - name: NETPULSE_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: netpulse-secrets
              key: password
        - name: NETPULSE_REDIS__SENTINEL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: netpulse-secrets
              key: password
        - name: NETPULSE_VAULT_TOKEN
          valueFrom:
            secretKeyRef:
              name: netpulse-secrets
              key: vault-token
        volumeMounts:
        - name: netpulse-storage
          mountPath: /app/storage
      volumes:
      - name: netpulse-storage
        persistentVolumeClaim:
          claimName: netpulse-storage
---
