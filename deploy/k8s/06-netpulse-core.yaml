# 02-netpulse/archiver-worker.deploy.yaml
# NOTE: Only apply this manifest when NETPULSE_MONGODB__ENABLED=true.
# When MongoDB is disabled, the archiver-worker exits cleanly on startup.
apiVersion: apps/v1
kind: Deployment
metadata:
  name: netpulse-archiver-worker
  namespace: netpulse
spec:
  replicas: 2
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: netpulse
      component: archiver-worker
  template:
    metadata:
      labels:
        app: netpulse
        component: archiver-worker
    spec:
      containers:
      - name: archiver-worker
        image: localhost/netpulse-archiver-worker:0.4.3
        imagePullPolicy: IfNotPresent
        resources:
          requests:
            memory: "512Mi"
            cpu: "200m"
          limits:
            memory: "2Gi"
            cpu: "1000m"
        envFrom:
        - configMapRef:
            name: netpulse-config
        env:
        - name: NETPULSE_REDIS__PASSWORD
          valueFrom:
            secretKeyRef:
              name: netpulse-secrets
              key: password
        - name: NETPULSE_REDIS__SENTINEL__PASSWORD
          valueFrom:
            secretKeyRef:
              name: netpulse-secrets
              key: password
---
# 02-netpulse/service.yaml
apiVersion: v1
kind: Service
metadata:
  name: netpulse
  namespace: netpulse
spec:
  selector:
    app: netpulse
    component: controller
  ports:
  - port: 9000
    targetPort: 9000
  type: ClusterIP # Could be LoadBalancer if not using Ingress.
